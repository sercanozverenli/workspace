<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Workspace · Personal R&D Hub</title>
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>

body, .sidebar {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
}

/* Docsify'ın kendi navbar'ını gizle */
.app-nav { display: none !important; }

/* ── TOPBAR ──────────────────────────────────────── */
#topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50px;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    padding: 0 24px 0 320px;
    gap: 16px;
    z-index: 300;
    box-sizing: border-box;
}

body.dark #topbar { 
    background: rgba(30, 41, 59, 0.8) !important;
    border-bottom-color: #334155; 
}

#topbar-search { flex: 1; max-width: 380px; }

#topbar-search-input {
width: 100%;
padding: 7px 16px;
border: 1px solid #e2e8f0;
border-radius: 20px;
font-size: 13px;
color: #2c3e50;
background: #f8fafc;
outline: none;
transition: border-color 0.15s, background 0.15s;
box-sizing: border-box;
}
#topbar-search-input:focus { border-color: #3b82f6; background: #fff; }

.topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }

.lang-switcher { display: flex; align-items: center; gap: 4px; }
.lang-switcher a {
font-size: 13px;
font-weight: 600;
color: #475569;
text-decoration: none;
padding: 5px 8px;
border-radius: 6px;
transition: background 0.15s, color 0.15s;
}
.lang-switcher a:hover { background: #f0f4f8; color: #1e293b; }

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
border-right: 1px solid #e2e8f0;
top: 50px !important;
height: calc(100vh - 50px) !important;
padding-top: 16px !important;
}

/* ── İÇERİK ──────────────────────────────────────── */
.markdown-section { 
    padding-top: 70px !important; 
    line-height: 1.7;
    font-size: 16px; 
}

.markdown-section blockquote {
    border-left: 4px solid #3b82f6 !important;
    background: #f8fafc !important;
    padding: 16px !important;
    border-radius: 0 8px 8px 0 !important;
    color: #475569 !important;
    margin: 2em 0 !important;
}

/* ── TABLO DÜZELTMELERİ (Karanlık Mod Okunabilirlik) ── */
body.dark .markdown-section table {
    background-color: #1e293b !important;
    color: #e2e8f0 !important;
    border-collapse: collapse !important;
}
body.dark .markdown-section table tr {
    background-color: #0f172a !important; /* Koyu arka plan */
    border-top: 1px solid #334155 !important;
}
body.dark .markdown-section table tr:nth-child(2n) {
    background-color: #1e293b !important; /* Zebra satırı da koyu kalsın */
}
body.dark .markdown-section table td,
body.dark .markdown-section table th {
    border: 1px solid #334155 !important;
    color: #e2e8f0 !important;
    padding: 10px !important;
}
body.dark .markdown-section table th {
    background-color: #1e293b !important;
    font-weight: bold !important;
}

body.dark .markdown-section blockquote {
    background: #1e293b !important;
    color: #94a3b8 !important;
}    
    
@media screen and (max-width: 768px) {
#topbar { padding-left: 60px; }
.markdown-section { padding-top: 60px !important; }
}

/* ── DOCSIFY ARAMA ─────── */
.search { border: none !important; padding: 0 !important; margin: 0 !important; }
.search .input-wrap { display: none !important; }
.search > p { display: none !important; }

.results-panel {
position: fixed !important;
top: 50px !important;
left: 0 !important;
width: 380px !important;
max-height: 420px !important;
overflow-y: auto !important;
z-index: 400 !important;
background: #fff !important;
border: 1px solid #e2e8f0 !important;
border-top: none !important;
border-radius: 0 0 8px 8px !important;
box-shadow: 0 8px 24px rgba(0,0,0,0.08) !important;
}

body.close .sidebar { overflow: visible !important; }
body.close .results-panel { transform: translateX(300px) !important; }

/* ── SIDEBAR NAV GENEL STİLLER ── */
.sidebar-nav { padding: 4px 8px; }

/* Tüm menü elemanlarının ortak rengi */
.sidebar-nav summary, .sidebar-nav a {
    color: #94a3b8 !important;
    text-decoration: none !important;
    transition: all 0.15s ease !important;
}

/* Klasör olanlar (summary) her seviyede BOLD */
.sidebar-nav summary { font-weight: 700 !important; }

/* Dosya olanlar (a) her seviyede NORMAL */
.sidebar-nav a { font-weight: 400 !important; }

/* ── HOVER SİSTEMİ (Tüm Seviyeler İçin) ── */
.sidebar-nav summary:hover, .sidebar-nav a:hover {
    background: #f1f5f9 !important;
    color: #1e293b !important;
    border-radius: 6px !important;
}

body.dark .sidebar-nav summary:hover, body.dark .sidebar-nav a:hover {
    background: #334155 !important; /* Yumuşak koyu gri hover */
    color: #f1f5f9 !important;
}

/* 1. Seviye Başlıklar (SİSTEMLER vb.) - Büyük Harf */
.sidebar-nav > details > summary {
    text-transform: uppercase !important;
    letter-spacing: 0.08em !important;
}

.sidebar-nav .home-link {
display: block;
padding: 8px 12px;
font-weight: 700;
font-size: 16px;
color: #2c3e50;
text-decoration: none;
border-radius: 6px;
margin-bottom: 16px;
margin-top: 40px;
letter-spacing: 0.02em;
}
.sidebar-nav .home-link:hover { background: #f0f4f8; }

/* Aktif Link Görünümü */
.sidebar-nav a.active {
    color: #1e293b !important;
    border-left: 3px solid #3b82f6 !important;
    background: transparent !important;
}
body.dark .sidebar-nav a.active {
    color: #f1f5f9 !important;
    border-left-color: #3b82f6 !important;
}

.badge {
font-size: 10px; font-weight: 600; padding: 1px 7px;
border-radius: 10px; margin-left: auto; flex-shrink: 0; white-space: nowrap;
}
.badge.active  { background: #dbeafe; color: #1d4ed8; }
.badge.planned { background: #f1f5f9; color: #64748b; }
.badge.done    { background: #dcfce7; color: #15803d; }
.badge.ongoing { background: #fef08a; color: #a16207; }

/* ── DARK MODE ───────────────────────────────────── */
body.dark { background: #0f172a; color: #e2e8f0; }

body.dark .sidebar { 
    background: #1e293b !important; 
    border-right: 1px solid #334155 !important;
    border-left: none !important;
}

body.dark #topbar-search-input { background: #0f172a; border-color: #334155; color: #e2e8f0; }
body.dark #topbar-search-input::placeholder { color: #64748b; }
body.dark #topbar-search-input:focus { border-color: #3b82f6; background: #1e293b; }

body.dark .lang-switcher a { color: #94a3b8; }
body.dark .lang-switcher a:hover { background: #334155; color: #e2e8f0; }

body.dark .markdown-section { color: #e2e8f0; }
body.dark .markdown-section h1,
body.dark .markdown-section h2,
body.dark .markdown-section h3,
body.dark .markdown-section h4 { color: #f1f5f9; border-color: #334155; }
body.dark .markdown-section a { color: #60a5fa; }
body.dark .markdown-section code { background: #334155; color: #e2e8f0; }
body.dark .markdown-section pre { background: #1e293b; border: 1px solid #334155; }

/* ── TOTAL MINIMALIST: OKLARI KALDIRMA VE PADDING AYARLARI ── */
.sidebar-nav summary::before,
.sidebar-nav details summary::before,
.sidebar-nav details details summary::before,
.sidebar-nav details details details summary::before,
.sidebar-nav li::marker,
.sidebar-nav ul li::before,
.sidebar-nav summary::marker,
.sidebar-nav details summary::-webkit-details-marker {
  display: none !important;
  content: none !important;
  list-style: none !important;
}

/* 1. Seviye (SİSTEMLER) */
.sidebar-nav > details > summary { padding: 6px 1px !important; font-size: 13px !important; }

/* 2. Seviye (Amplify Core) - Punto 13px yapıldı */
.sidebar-nav > details > ul > li > details > summary { 
    padding: 5px 12px 5px 14px !important; 
    font-size: 13px !important; 
}

/* 3. Seviye (Araştırma, Mimari) */
.sidebar-nav > details > ul > li > details > ul > li > details > summary {
  cursor: pointer !important;
  display: flex !important;
  align-items: center !important;
  padding: 5px 12px 5px 26px !important;
  font-size: 12x !important;
  border-radius: 6px !important;
  border-left: 3px solid transparent !important;
}

/* 4. Seviye (Linkler) */
.sidebar-nav > details > ul > li > details > ul > li > details > ul > li > a {
  display: flex !important;
  align-items: center !important;
  padding: 5px 12px 5px 38px !important;
  font-size: 12px !important;
  border-radius: 6px !important;
  border-left: 3px solid transparent !important;
}

/* ── MODERN BUTON TASARIMLARI (Hamburger & Tema) ── */
.sidebar-toggle {
    background: #f8fafc !important;
    border: 1px solid #e2e8f0 !important;
    border-radius: 8px !important;
    padding: 10px !important;
    width: 38px !important;
    height: 38px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    transition: all 0.2s ease-in-out !important;
    top: 65px !important; 
    left: 15px !important;
    position: fixed !important;
    z-index: 99;
}

.sidebar-toggle span {
    background-color: #475569 !important; 
    height: 2px !important;
    width: 18px !important;
    margin-bottom: 3px !important;
}
.sidebar-toggle span:last-child { margin-bottom: 0 !important; }

#theme-toggle {
    background: #f8fafc !important;
    border: 1px solid #e2e8f0 !important;
    border-radius: 8px !important;
    width: 34px !important;
    height: 34px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    cursor: pointer;
    transition: all 0.2s !important;
}

.sidebar-toggle:hover, #theme-toggle:hover {
    background: #f1f5f9 !important;
    transform: translateY(-1px);
}

body.dark .sidebar-toggle, body.dark #theme-toggle {
    background: #1e293b !important;
    border-color: #334155 !important;
    color: #f1f5f9 !important;
}

body.dark .sidebar-toggle span { background-color: #94a3b8 !important; }

/* Scrollbar */
.sidebar::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
body.dark .sidebar::-webkit-scrollbar-thumb { background: #334155; }

/* Mikro Etkileşimler */
.badge, #theme-toggle, .lang-switcher a, .sidebar-nav a {
    transition: all 0.2s ease-in-out !important;
}

</style>
<script src="https://unpkg.com/lucide@latest"></script>    
</head>
<body>

<div id="topbar">
    <div id="topbar-search">
        <input type="text" id="topbar-search-input" placeholder="Ara..." autocomplete="off" spellcheck="false">
    </div>
    <div class="topbar-right">
        <button id="theme-toggle" title="Temayı Değiştir">
            <i data-lucide="moon" id="theme-icon"></i>
        </button>
        <div class="lang-switcher">
            <a href="#/en/" id="lang-toggle">EN</a>
        </div>
    </div>
</div>

<div id="app"></div>

<script>
// 1. TEMA VE İKON YÖNETİMİ
(function() {
    const themeToggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    let isDark = saved === 'dark' || (!saved && prefersDark);

    function applyTheme(dark) {
        document.body.classList.toggle('dark', dark);
        const themeToggleBtn = document.getElementById('theme-toggle');
        if (themeToggleBtn) {
            themeToggleBtn.innerHTML = `<i data-lucide="${dark ? 'sun' : 'moon'}"></i>`;
            if (window.lucide) lucide.createIcons();
        }
    }

    applyTheme(isDark);

    themeToggle.addEventListener('click', () => {
        isDark = !isDark;
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        applyTheme(isDark);
    });
})();

// 2. DİL YÖNETİMİ
function updateLang() {
    let currentHash = window.location.hash || '#/tr/';
    const langToggle = document.getElementById('lang-toggle');
    const searchInput = document.getElementById('topbar-search-input');

    if (currentHash.startsWith('#/en/')) {
        langToggle.textContent = 'TR';
        langToggle.href = currentHash.replace('#/en/', '#/tr/');
        searchInput.placeholder = 'Search...';
    } else {
        langToggle.textContent = 'EN';
        let target = currentHash.includes('#/tr/') ? currentHash.replace('#/tr/', '#/en/') : '#/en/';
        langToggle.href = target;
        searchInput.placeholder = 'Ara...';
    }
}
window.addEventListener('hashchange', updateLang);
updateLang();

// 3. SIDEBAR SENKRONİZASYONU
function syncSidebar() {
    const currentHash = decodeURIComponent(window.location.hash);
    if (!currentHash || currentHash === '#/') return;

    const activeLink = document.querySelector(`.sidebar-nav a[href="${currentHash}"]`);
    if (activeLink) {
        document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
        activeLink.classList.add('active');

        let parent = activeLink.parentElement;
        while (parent && !parent.classList.contains('sidebar-nav')) {
            if (parent.tagName === 'DETAILS') parent.setAttribute('open', '');
            parent = parent.parentElement;
        }
        activeLink.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
}

// 4. ARAMA PROXY
function setupSearchProxy() {
    const sidebarInput = document.querySelector('.search input');
    if (!sidebarInput) { setTimeout(setupSearchProxy, 300); return; }
    const topbarInput = document.getElementById('topbar-search-input');

    topbarInput.addEventListener('input', function() {
        sidebarInput.value = this.value;
        sidebarInput.dispatchEvent(new Event('input', { bubbles: true }));
    });
}

// 5. TOGGLE KONUMU SABİTLEME
function fixTogglePosition() {
    const toggle = document.querySelector('.sidebar-toggle');
    if (!toggle) return;
    toggle.style.setProperty('top', '65px', 'important');
    toggle.style.setProperty('left', '15px', 'important');
}

// 6. DOCSIFY CONFIG
window.$docsify = {
    loadSidebar: true,
    loadNavbar: false,
    subMaxLevel: 0,
    search: { 
        maxAge: 86400000,
        paths: 'auto', 
        placeholder: 'Ara...',
        noData: 'Sonuç bulunamadı.',
        depth: 3
    },
    alias: {
        '/': '/tr/README.md',
        '/_sidebar.md': '/tr/_sidebar.md',
        '/tr/.*/_sidebar.md': '/tr/_sidebar.md',
        '/en/.*/_sidebar.md': '/en/_sidebar.md'
    },
    plugins: [
        function(hook) {
            hook.ready(() => {
                setupSearchProxy();
                syncSidebar();
                fixTogglePosition();
                if (window.lucide) lucide.createIcons();
            });
            hook.doneEach(() => {
                syncSidebar();
                fixTogglePosition();
            });
        }
    ]
}
</script>

<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

</body>
</html>
