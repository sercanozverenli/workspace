<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Workspace · Personal R&D Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* 1. Sol Menü Butonu Konumlandırması */
    .sidebar-toggle {
      bottom: auto !important;
      top: 15px !important;
      left: 15px !important;
      position: fixed !important;
      background: rgba(255, 255, 255, 0.9) !important;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      z-index: 99;
    }
    .sidebar {
      padding-top: 60px !important;
    }
    
    /* 2. Mobil Ekranda İçerik Çakışmasını Önleme */
    @media screen and (max-width: 768px) {
      .markdown-section {
        padding-top: 45px !important;
      }
    }
    
    /* 3. Sağ Üst Dil Seçeneğini Modern Butona Dönüştürme */
    .app-nav ul li {
      background-color: #f4f6f8;
      border-radius: 20px;
      padding: 4px 12px;
      margin-left: 10px;
      transition: all 0.2s ease-in-out;
    }
    .app-nav ul li:hover {
      background-color: #e2e8f0;
    }
    .app-nav li a {
      font-weight: 600;
      color: #2c3e50 !important;
      text-decoration: none;
    }

    /* Ana Sayfa Başlığını Ortala ve Stilleştir */
#ana-sayfa {
  text-align: center;
  margin-bottom: 20px;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

/* Yan Menü (Sidebar) Görünümünü Modernleştir */
.sidebar {
  font-size: 15px;
}
.sidebar ul li {
  margin: 5px 0;
}
.sidebar ul li a {
  padding: 8px 15px !important;
  border-radius: 5px;
  transition: all 0.3s;
}
.sidebar ul li a:hover {
  background: #f0f0f0;
}
  </style>
</head>
<body>
  <div id="app">Loading workspace...</div>
  
  <script>
    window.$docsify = {
      
      repo: '', 
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 0,
      
      alias: {
        // 1. KÖK DİZİN (VARSAYILAN DİL): 
        // Kullanıcı ana adrese (/#/) geldiğinde dosyaları Türkçe klasöründen çeker.
        '/': '/tr/',
        '/_sidebar.md': '/tr/_sidebar.md',
        '/_navbar.md': '/tr/_navbar.md',
        
        // 2. TÜRKÇE LOKASYON KORUMASI:
        // Alt klasörlerdeyken menülerin kaybolmasını engeller. (.+) ile loop koruması aktiftir.
        '/tr/(.+)/_sidebar.md': '/tr/_sidebar.md',
        '/tr/(.+)/_navbar.md': '/tr/_navbar.md',
        
        // 3. İNGİLİZCE LOKASYON KORUMASI:
        // Alt klasörlerdeyken menülerin kaybolmasını engeller. (.+) ile loop koruması aktiftir.
        '/en/(.+)/_sidebar.md': '/en/_sidebar.md',
        '/en/(.+)/_navbar.md': '/en/_navbar.md'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
