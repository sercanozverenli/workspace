<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Workspace · Personal R&D Hub</title>
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>

body, .sidebar {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
}

/* Docsify'ın kendi navbar'ını gizle */
.app-nav { display: none !important; }

/* ── TOPBAR ──────────────────────────────────────── */
#topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50px;
    background: rgba(255, 255, 255, 0.8); /* Şeffaflık eklendi */
    backdrop-filter: blur(10px); /* Bulanıklık eklendi */
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    padding: 0 24px 0 320px;
    gap: 16px;
    z-index: 300;
    box-sizing: border-box;
}

body.dark #topbar { 
    background: rgba(30, 41, 59, 0.8) !important; /* Karanlık mod şeffaflığı */
    border-bottom-color: #334155; 
}

#topbar-search { flex: 1; max-width: 380px; }

#topbar-search-input {
width: 100%;
padding: 7px 16px;
border: 1px solid #e2e8f0;
border-radius: 20px;
font-size: 13px;
color: #2c3e50;
background: #f8fafc;
outline: none;
transition: border-color 0.15s, background 0.15s;
box-sizing: border-box;
}
#topbar-search-input:focus { border-color: #3b82f6; background: #fff; }

.topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }

#theme-toggle {
background: #f1f5f9;
border: 1px solid #e2e8f0;
border-radius: 6px;
padding: 5px 10px;
cursor: pointer;
font-size: 14px;
line-height: 1;
color: #475569;
transition: background 0.15s;
}
#theme-toggle:hover { background: #e2e8f0; }

.lang-switcher { display: flex; align-items: center; gap: 4px; }
.lang-switcher a {
font-size: 13px;
font-weight: 600;
color: #475569;
text-decoration: none;
padding: 5px 8px;
border-radius: 6px;
transition: background 0.15s, color 0.15s;
}
.lang-switcher a:hover { background: #f0f4f8; color: #1e293b; }

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
border-right: 1px solid #e2e8f0;
top: 50px !important;
height: calc(100vh - 50px) !important;
padding-top: 16px !important;
}

.sidebar-toggle,
body.close .sidebar-toggle {
top: 65px !important;
bottom: auto !important;
left: 15px !important;
position: fixed !important;
background: transparent !important;
border: none !important;
z-index: 99;
}

/* ── İÇERİK ──────────────────────────────────────── */
.markdown-section { 
    padding-top: 70px !important; 
    line-height: 1.7; /* Satır aralığı eklendi */
    font-size: 16px; 
}

/* Alıntı (Blockquote) kutularını güzelleştir */
.markdown-section blockquote {
    border-left: 4px solid #3b82f6 !important;
    background: #f8fafc !important;
    padding: 16px !important;
    border-radius: 0 8px 8px 0 !important;
    color: #475569 !important;
    margin: 2em 0 !important;
}

body.dark .markdown-section blockquote {
    background: #1e293b !important;
    color: #94a3b8 !important;
}    
    
@media screen and (max-width: 768px) {
#topbar { padding-left: 60px; }
.markdown-section { padding-top: 60px !important; }
}

/* ── DOCSIFY ARAMA: gizle ama çalışır bırak ─────── */
.search { border: none !important; padding: 0 !important; margin: 0 !important; }
.search .input-wrap { display: none !important; }
.search > p { display: none !important; }

.results-panel {
position: fixed !important;
top: 50px !important;
left: 0 !important;
width: 380px !important;
max-height: 420px !important;
overflow-y: auto !important;
z-index: 400 !important;
background: #fff !important;
border: 1px solid #e2e8f0 !important;
border-top: none !important;
border-radius: 0 0 8px 8px !important;
box-shadow: 0 8px 24px rgba(0,0,0,0.08) !important;
}

/* FIX: Sidebar kapalıyken arama sonuçlarını görünür yap */
body.close .sidebar { overflow: visible !important; }
body.close .results-panel { transform: translateX(300px) !important; }


/* ── SIDEBAR NAV ─────────────────────────────────── */
.sidebar-nav { padding: 4px 8px; }

.sidebar-nav .home-link {
display: block;
padding: 8px 12px;
font-weight: 700;
font-size: 16px;
color: #2c3e50;
text-decoration: none;
border-radius: 6px;
margin-bottom: 16px;
margin-top: 40px;
letter-spacing: 0.02em;
}
.sidebar-nav .home-link:hover { background: #f0f4f8; }

.sidebar-nav > details { margin: 2px 0; }
.sidebar-nav > details > summary {
cursor: pointer;
padding: 6px 12px;
font-size: 11px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.08em;
color: #94a3b8;
list-style: none;
display: flex;
align-items: center;
gap: 8px;
border-radius: 6px;
user-select: none;
}
.sidebar-nav > details > summary::-webkit-details-marker { display: none; }
.sidebar-nav > details > summary::before {
content: '▶';
font-size: 8px;
transition: transform 0.2s;
}
.sidebar-nav > details[open] > summary::before { transform: rotate(90deg); }
.sidebar-nav > details > summary:hover { background: #f0f4f8; color: #64748b; }

.sidebar-nav > details > ul { list-style: none; padding: 2px 0 6px 0; margin: 0; }
.sidebar-nav > details > ul > li { list-style: none; }
.sidebar-nav > details > ul > li > a {
display: flex; align-items: center; gap: 6px;
padding: 5px 12px 5px 24px;
font-size: 13px; color: #475569; text-decoration: none;
border-radius: 6px; border-left: 3px solid transparent;
transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.sidebar-nav > details > ul > li > a:hover {
background: #f0f4f8; border-left-color: #3b82f6; color: #1e293b;
}

.sidebar-nav > details > ul > li > details { margin: 2px 0; }
.sidebar-nav > details > ul > li > details > summary {
cursor: pointer; display: flex; align-items: center; gap: 8px;
padding: 5px 12px 5px 24px;
font-size: 13px; font-weight: 600; color: #475569;
list-style: none; border-radius: 6px; border-left: 3px solid transparent;
user-select: none;
transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.sidebar-nav > details > ul > li > details > summary::-webkit-details-marker { display: none; }
.sidebar-nav > details > ul > li > details > summary::before {
content: '▶'; font-size: 8px; transition: transform 0.2s; flex-shrink: 0;
}
.sidebar-nav > details > ul > li > details[open] > summary::before { transform: rotate(90deg); }
.sidebar-nav > details > ul > li > details > summary:hover {
background: #f0f4f8; border-left-color: #3b82f6; color: #1e293b;
}

.sidebar-nav > details > ul > li > details > ul { list-style: none; padding: 2px 0 4px 0; margin: 0; }
.sidebar-nav > details > ul > li > details > ul > li { list-style: none; }
.sidebar-nav > details > ul > li > details > ul > li > a {
display: flex; align-items: center; gap: 6px;
padding: 5px 12px 5px 40px;
font-size: 13px; color: #64748b; text-decoration: none;
border-radius: 6px; border-left: 3px solid transparent;
transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.sidebar-nav > details > ul > li > details > ul > li > a:hover {
background: #f0f4f8; border-left-color: #3b82f6; color: #1e293b;
}

.badge {
font-size: 10px; font-weight: 600; padding: 1px 7px;
border-radius: 10px; margin-left: auto; flex-shrink: 0; white-space: nowrap;
}
.badge.active  { background: #dbeafe; color: #1d4ed8; }
.badge.planned { background: #f1f5f9; color: #64748b; }
.badge.done    { background: #dcfce7; color: #15803d; }
.badge.ongoing { background: #fef08a; color: #a16207; } /* Sarı tonları */  

/* ── DARK MODE ───────────────────────────────────── */

body.dark .sidebar-nav > details > summary:hover { background: #334155; color: #94a3b8; }

body.dark .sidebar-nav > details > ul > li > details > summary:hover { background: #334155; color: #e2e8f0; }
body.dark .sidebar-nav > details > ul > li > details > ul > li > a { color: #64748b; }
body.dark .sidebar-nav > details > ul > li > details > ul > li > a:hover { background: #334155; color: #e2e8f0; }

body.dark .markdown-section { color: #e2e8f0; }

body.dark .badge.active { background: #172554; color: #60a5fa; }

/* ── TOTAL MINIMALIST: TÜM OK İKONLARINI KALDIRMA VE ALAN GENİŞLETME ─────── */

<body>

<div id="topbar">
<div id="topbar-search">
<input type="text" id="topbar-search-input" placeholder="Ara..." autocomplete="off" spellcheck="false">
</div>
<div class="topbar-right">
<button id="theme-toggle" title="Temayı Değiştir">
  <i data-lucide="moon" id="theme-icon"></i>
</button>
<div class="lang-switcher">
<a href="#/en/" id="lang-toggle">EN</a>
</div>
</div>
</div>
 
<script>
   
// Tema toggle ve İkon değişimi
const themeToggle = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');

function updateThemeIcon(isDark) {
    // İkonu değiştir
    themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
    // Lucide'i tekrar çalıştır ki yeni ikonu çizsin
    lucide.createIcons();
}

themeToggle.addEventListener('click', function() {
    const isDark = document.body.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    updateThemeIcon(isDark);
});

// Sayfa ilk açıldığında ikonu ayarla
const isInitialDark = document.body.classList.contains('dark');
updateThemeIcon(isInitialDark);
</script>

<div id="app"></div>

<script>
// Tema toggle
document.getElementById('theme-toggle').addEventListener('click', function() {
const isDark = document.body.classList.toggle('dark');
localStorage.setItem('theme', isDark ? 'dark' : 'light');
this.textContent = isDark ? '☀️' : '🌙';
});

// Dil seçici (Tek butonlu akıllı toggle)
function updateLang() {
    // Mevcut hash'i al, eğer boşsa varsayılan olarak #/tr/ kabul et
    let currentHash = window.location.hash || '#/tr/';
    const langToggle = document.getElementById('lang-toggle');
    const searchInput = document.getElementById('topbar-search-input');

    // Eğer şu an İngilizce dizinindeysek
    if (currentHash.startsWith('#/en/')) {
        langToggle.textContent = 'TR';
        // Mevcut URL'deki #/en/ kısmını #/tr/ ile değiştir, geri kalanı koru
        langToggle.href = currentHash.replace('#/en/', '#/tr/');
        searchInput.placeholder = 'Search...';
    } 
    // Eğer şu an Türkçe dizinindeysek (veya root'taysak)
    else {
        langToggle.textContent = 'EN';
        // Mevcut URL'deki #/tr/ kısmını #/en/ ile değiştir
        // Eğer linkte hiç /tr/ yoksa direkt #/en/ dizinine yönlendir
        let target = currentHash.includes('#/tr/') 
                     ? currentHash.replace('#/tr/', '#/en/') 
                     : '#/en/';
        langToggle.href = target;
        searchInput.placeholder = 'Ara...';
    }
}
updateLang();
window.addEventListener('hashchange', updateLang);

// sidebar konum gösterme  
function syncSidebar() {
    const currentHash = decodeURIComponent(window.location.hash);
    if (!currentHash || currentHash === '#/') return;

    // 1. Mevcut URL ile eşleşen linki sidebar içinde bul
    // (href içindeki yolu tam eşleştirmek için selector'ı dikkatli seçiyoruz)
    const activeLink = document.querySelector(`.sidebar-nav a[href="${currentHash}"]`);

    if (activeLink) {
        // 2. Önceki aktiflik sınıflarını temizle (opsiyonel)
        document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
        
        // 3. Bulunan linke aktif sınıfı ekle
        activeLink.classList.add('active');

        // 4. Linkin üstündeki tüm <details> elementlerini bul ve aç
        let parent = activeLink.parentElement;
        while (parent && !parent.classList.contains('sidebar-nav')) {
            if (parent.tagName === 'DETAILS') {
                parent.setAttribute('open', ''); // Menüyü açar
            }
            parent = parent.parentElement;
        }

        // 5. Aktif linkin görünür olduğundan emin ol (scroll)
        activeLink.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
}

  
// Arama proxy — topbar input'u Docsify'ın gizli arama input'una bağlar
function setupSearchProxy() {
    const sidebarInput = document.querySelector('.search input');
    if (!sidebarInput) { setTimeout(setupSearchProxy, 300); return; }

    const topbarInput = document.getElementById('topbar-search-input');

    function repositionResultsPanel() {
        const panel = document.querySelector('.results-panel');
        const input = document.getElementById('topbar-search-input');
        if (!panel || !input) return;

        const rect = input.getBoundingClientRect();
        
        // Sidebar kapalı mı kontrol et
        const isSidebarClosed = document.body.classList.contains('close');
        const isMobile = window.innerWidth <= 768;

        // Eğer sidebar kapalıysa, panel sidebar'ın içinde olduğu için koordinat sistemi kaymıştır.
        // Bunu düzeltmek için 300px çıkarıyoruz (CSS'deki translateX(300px) ile dengelenir).
        let finalLeft = rect.left;
        if (isSidebarClosed && !isMobile) {
            finalLeft = rect.left - 300; 
        }

        panel.style.setProperty('left', finalLeft + 'px', 'important');
        panel.style.setProperty('width', Math.max(rect.width, 380) + 'px', 'important');
    }

    topbarInput.addEventListener('input', function() {
        sidebarInput.value = this.value;
        sidebarInput.dispatchEvent(new Event('input', { bubbles: true }));
        // Panelin oluşması için bir frame bekle
        requestAnimationFrame(repositionResultsPanel);
    });

    // Sidebar açma/kapama butonuna basıldığında konumu güncelle
    document.addEventListener('click', function(e) {
        if (e.target.closest('.sidebar-toggle')) {
            setTimeout(repositionResultsPanel, 300); // Animasyon bitişini bekle
        }
    });

    window.addEventListener('resize', repositionResultsPanel);

    topbarInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            this.value = '';
            sidebarInput.value = '';
            sidebarInput.dispatchEvent(new Event('input', { bubbles: true }));
        }
    });
}

// Mobilden summary tıklanınca sidebar kapanmasın,
// sadece gerçek link tıklanınca kapansın
function fixMobileSidebar() {
document.querySelectorAll('.sidebar-nav summary').forEach(function(summary) {
summary.addEventListener('click', function(e) {
e.stopPropagation();
});
});
}

// Hamburger butonunu her zaman aynı yerde tut
function fixTogglePosition() {
const toggle = document.querySelector('.sidebar-toggle');
if (!toggle) return;
toggle.style.setProperty('top', '65px', 'important');
toggle.style.setProperty('left', '15px', 'important');
toggle.style.setProperty('bottom', 'auto', 'important');
}

document.addEventListener('click', function(e) {
if (e.target.closest('.sidebar-toggle')) {
setTimeout(fixTogglePosition, 50);
}
});

fixTogglePosition();

// Docsify config
window.$docsify = {
  loadSidebar: true,
  loadNavbar: false,
  subMaxLevel: 0,
  search: {
    maxAge: 86400000,
    paths: 'auto',
    placeholder: 'Ara...',
    noData: 'Sonuç bulunamadı.',
    depth: 3,
    hideOtherSidebarContent: false
  },
  alias: {
    '/': '/tr/README.md',
    '/_sidebar.md':        '/tr/_sidebar.md',
    '/tr/.*/_sidebar.md':  '/tr/_sidebar.md',
    '/en/.*/_sidebar.md':  '/en/_sidebar.md'
  },
  plugins: [
    function(hook) {
      hook.ready(function() {
        // Sayfa ilk yüklendiğinde çalışacaklar
        setupSearchProxy();
        fixMobileSidebar();
        fixTogglePosition();
        syncSidebar(); // <--- YENİ: Sidebar'ı mevcut sayfaya göre açar
      });
      hook.doneEach(function() {
        // Her sayfa değişiminde (linke tıklandığında) çalışacaklar
        fixMobileSidebar();
        syncSidebar(); // <--- YENİ: Sidebar'ı mevcut sayfaya göre açar
      });
    }
  ]
}
  
</script>
