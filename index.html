<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Workspace · Personal R&D Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .sidebar-toggle {
      bottom: auto !important;
      top: 15px !important;
      left: 15px !important;
      position: fixed !important;
      background: rgba(255, 255, 255, 0.9) !important;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      z-index: 99;
    }
    .sidebar {
      padding-top: 60px !important;
    }

    /* Mobil ekranlarda başlığı aşağı iterek butonla çakışmasını engeller */
@media screen and (max-width: 768px) {
  .markdown-section {
    padding-top: 45px !important;
  }
}

    /* Navbar yazılarını modern, yuvarlak butonlara dönüştürür */
.app-nav ul li {
  background-color: #f4f6f8;
  border-radius: 20px;
  padding: 4px 12px;
  margin-left: 10px;
  transition: all 0.2s ease-in-out;
}
.app-nav ul li:hover {
  background-color: #e2e8f0;
}
.app-nav li a {
  font-weight: 600;
  color: #2c3e50 !important;
  text-decoration: none;
}
  </style>
</head>
<body>
  <div id="app">Loading workspace...</div>
  
  <script>
    window.$docsify = {
      name: 'Workspace',
      repo: '', 
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      alias: {
        // Siteye ilk gireni doğrudan Türkçe klasörüne atar
        '/': '/tr/',
        
        // Türkçe klasörünün neresinde olursan ol tr menülerini gösterir
        '/tr/.*/_sidebar.md': '/tr/_sidebar.md',
        '/tr/.*/_navbar.md': '/tr/_navbar.md',
        
        // İngilizce klasörünün neresinde olursan ol en menülerini gösterir
        '/en/.*/_sidebar.md': '/en/_sidebar.md',
        '/en/.*/_navbar.md': '/en/_navbar.md'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
