<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Workspace · Personal R&D Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* Üst Bar Yerleşimi (Search & Theme için optimize edildi) */
    .top-bar {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      height: 50px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid #e2e8f0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 0 320px; /* Sidebar açıkken çakışmayı önler */
    }

    /* Mobil Ekran Optimizasyonu */
    @media screen and (max-width: 768px) {
      .top-bar {
        padding-left: 70px;
      }
      .markdown-section {
        padding-top: 70px !important;
      }
    }

    /* Arama Kutusu Modernizasyonu */
    .search {
      margin: 0 !important;
      width: 250px;
    }
    .search input {
      border: 1px solid #cbd5e1 !important;
      border-radius: 6px !important;
      padding: 6px 12px !important;
      font-size: 13px !important;
      background: #f8fafc !important;
      transition: all 0.2s !important;
    }
    .search input:focus {
      border-color: #42b983 !important;
      background: #ffffff !important;
      box-shadow: 0 0 0 3px rgba(66, 185, 131, 0.1) !important;
    }

    /* Sağ Bölüm Buton Alanı */
    .top-bar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Tema Değiştirme Butonu Tasarımı */
    .theme-btn {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      color: #334155;
      transition: all 0.2s;
    }
    .theme-btn:hover {
      background: #e2e8f0;
    }

    /* Docsify Yerleşik Navbar'ını (Dil Seçeneğini) Sağ Üste Hizalama */
    .app-nav {
      position: static !important;
      margin: 0 !important;
    }
    .app-nav ul {
      margin: 0;
      padding: 0;
      display: flex;
      gap: 8px;
    }
    .app-nav ul li {
      background-color: #f4f6f8;
      border-radius: 20px;
      padding: 4px 14px;
      list-style: none;
      transition: all 0.2s ease-in-out;
    }
    .app-nav ul li:hover {
      background-color: #e2e8f0;
    }
    .app-nav li a {
      font-weight: 600;
      color: #2c3e50 !important;
      text-decoration: none;
      font-size: 13px;
    }

    /* Sidebar Düzenlemeleri */
    .sidebar-toggle { bottom: auto !important; top: 12px !important; left: 15px !important; position: fixed !important; z-index: 99; }
    .sidebar { padding-top: 70px !important; z-index: 20; }
    .content { padding-top: 40px !important; }

    /* Rozet (Badge) Tasarımları */
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-weight: bold; }
    .badge.active { background-color: #e6fffa; color: #047481; }
    .badge.planned { background-color: #f7fafc; color: #4a5568; border: 1px solid #edf2f7; }
  </style>
</head>
<body>
  
  <div class="top-bar">
    <div id="search-placeholder"></div>
    
    <div class="top-bar-actions">
      <button class="theme-btn" id="theme-toggle">🌓 Tema</button>
      <nav class="app-nav"></nav>
    </div>
  </div>

  <div id="app">Yükleniyor...</div>

  <script>
    window.$docsify = {
      loadSidebar: true,
      loadNavbar: true, // NAVBAR'I TEKRAR AKTİF EDİYORUZ
      subMaxLevel: 0,
      
      // Arama Ayarları (Üst bara taşındı)
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: {
          '/en/': 'Search...',
          '/': 'Ara...'
        },
        noData: {
          '/en/': 'No results!',
          '/': 'Sonuç bulunamadı!'
        },
        depth: 2,
        hideOtherSidebarContent: false,
        // Aramayı bizim oluşturduğumuz placeholder içine koyar
        el: '#search-placeholder' 
      },

      alias: {
        // BOZULAN KURAL: Kök dizine girişte doğrudan Türkçe çalışma alanını yükler
        '/':                     '/tr/README.md',

        // Mevcut ve tıkır tıkır çalışan diğer alias kuralların (Aynen Korundu)
        '/_sidebar.md':          '/tr/_sidebar.md',
        '/tr/.*/_sidebar.md':    '/tr/_sidebar.md',
        '/en/.*/_sidebar.md':    '/en/_sidebar.md',
        '/_navbar.md':           '/tr/_navbar.md',
        '/tr/.*/_navbar.md':     '/tr/_navbar.md',
        '/en/.*/_navbar.md':     '/en/_navbar.md'
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <script>
    const themeBtn = document.getElementById('theme-toggle');
    let currentTheme = 'vue';
    themeBtn.addEventListener('click', () => {
      const link = document.querySelector('link[href*="themes"]');
      if (currentTheme === 'vue') {
        link.href = '//cdn.jsdelivr.net/npm/docsify@4/lib/themes/buble.css';
        currentTheme = 'buble';
      } else {
        link.href = '//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css';
        currentTheme = 'vue';
      }
    });
  </script>
</body>
</html>
