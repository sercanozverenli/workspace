<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Workspace · Personal R&D Hub</title>
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>

body, .sidebar {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
}

/* Docsify'ın kendi navbar'ını gizle */
.app-nav { display: none !important; }

/* ── TOPBAR ──────────────────────────────────────── */
#topbar {
position: fixed;
top: 0;
left: 0;
right: 0;
height: 50px;
background: #fff;
border-bottom: 1px solid #e2e8f0;
display: flex;
align-items: center;
padding: 0 24px 0 320px;
gap: 16px;
z-index: 300;
box-sizing: border-box;
}

#topbar-search { flex: 1; max-width: 380px; }

#topbar-search-input {
width: 100%;
padding: 7px 16px;
border: 1px solid #e2e8f0;
border-radius: 20px;
font-size: 13px;
color: #2c3e50;
background: #f8fafc;
outline: none;
transition: border-color 0.15s, background 0.15s;
box-sizing: border-box;
}
#topbar-search-input:focus { border-color: #3b82f6; background: #fff; }

.topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }

#theme-toggle {
background: #f1f5f9;
border: 1px solid #e2e8f0;
border-radius: 6px;
padding: 5px 10px;
cursor: pointer;
font-size: 14px;
line-height: 1;
color: #475569;
transition: background 0.15s;
}
#theme-toggle:hover { background: #e2e8f0; }

.lang-switcher { display: flex; align-items: center; gap: 4px; }
.lang-switcher a {
font-size: 13px;
font-weight: 600;
color: #475569;
text-decoration: none;
padding: 5px 8px;
border-radius: 6px;
transition: background 0.15s, color 0.15s;
}
.lang-switcher a:hover { background: #f0f4f8; color: #1e293b; }

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
border-right: 1px solid #e2e8f0;
top: 50px !important;
height: calc(100vh - 50px) !important;
padding-top: 16px !important;
}

.sidebar-toggle,
body.close .sidebar-toggle {
top: 65px !important;
bottom: auto !important;
left: 15px !important;
position: fixed !important;
background: transparent !important;
border: none !important;
z-index: 99;
}

/* ── İÇERİK ──────────────────────────────────────── */
.markdown-section { padding-top: 70px !important; }

@media screen and (max-width: 768px) {
#topbar { padding-left: 60px; }
.markdown-section { padding-top: 60px !important; }
}

/* ── DOCSIFY ARAMA: gizle ama çalışır bırak ─────── */
.search { border: none !important; padding: 0 !important; margin: 0 !important; }
.search .input-wrap { display: none !important; }
.search > p { display: none !important; }

.results-panel {
position: fixed !important;
top: 50px !important;
left: 0 !important;
width: 380px !important;
max-height: 420px !important;
overflow-y: auto !important;
z-index: 400 !important;
background: #fff !important;
border: 1px solid #e2e8f0 !important;
border-top: none !important;
border-radius: 0 0 8px 8px !important;
box-shadow: 0 8px 24px rgba(0,0,0,0.08) !important;
}

/* FIX: Sidebar kapalıyken arama sonuçlarını görünür yap */
body.close .sidebar { overflow: visible !important; }
body.close .results-panel { transform: translateX(300px) !important; }

/* Docsify aktif link override */
.sidebar ul li a, .sidebar ul li a.active,
.sidebar ul li a.active:hover, .sidebar ul li a:hover {
color: #2c3e50 !important; background: transparent !important;
}
.sidebar ul li a.active { font-weight: 700 !important; }

/* ── SIDEBAR NAV ─────────────────────────────────── */
.sidebar-nav { padding: 4px 8px; }

.sidebar-nav .home-link {
display: block;
padding: 8px 12px;
font-weight: 700;
font-size: 16px;
color: #2c3e50;
text-decoration: none;
border-radius: 6px;
margin-bottom: 16px;
letter-spacing: 0.02em;
}
.sidebar-nav .home-link:hover { background: #f0f4f8; }

.sidebar-nav > details { margin: 2px 0; }
.sidebar-nav > details > summary {
cursor: pointer;
padding: 6px 12px;
font-size: 11px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.08em;
color: #94a3b8;
list-style: none;
display: flex;
align-items: center;
gap: 8px;
border-radius: 6px;
user-select: none;
}
.sidebar-nav > details > summary::-webkit-details-marker { display: none; }
.sidebar-nav > details > summary::before {
content: '▶';
font-size: 8px;
transition: transform 0.2s;
}
.sidebar-nav > details[open] > summary::before { transform: rotate(90deg); }
.sidebar-nav > details > summary:hover { background: #f0f4f8; color: #64748b; }

.sidebar-nav > details > ul { list-style: none; padding: 2px 0 6px 0; margin: 0; }
.sidebar-nav > details > ul > li { list-style: none; }
.sidebar-nav > details > ul > li > a {
display: flex; align-items: center; gap: 6px;
padding: 5px 12px 5px 24px;
font-size: 13px; color: #475569; text-decoration: none;
border-radius: 6px; border-left: 3px solid transparent;
transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.sidebar-nav > details > ul > li > a:hover {
background: #f0f4f8; border-left-color: #3b82f6; color: #1e293b;
}

.sidebar-nav > details > ul > li > details { margin: 2px 0; }
.sidebar-nav > details > ul > li > details > summary {
cursor: pointer; display: flex; align-items: center; gap: 8px;
padding: 5px 12px 5px 24px;
font-size: 13px; font-weight: 600; color: #475569;
list-style: none; border-radius: 6px; border-left: 3px solid transparent;
user-select: none;
transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.sidebar-nav > details > ul > li > details > summary::-webkit-details-marker { display: none; }
.sidebar-nav > details > ul > li > details > summary::before {
content: '▶'; font-size: 8px; transition: transform 0.2s; flex-shrink: 0;
}
.sidebar-nav > details > ul > li > details[open] > summary::before { transform: rotate(90deg); }
.sidebar-nav > details > ul > li > details > summary:hover {
background: #f0f4f8; border-left-color: #3b82f6; color: #1e293b;
}

.sidebar-nav > details > ul > li > details > ul { list-style: none; padding: 2px 0 4px 0; margin: 0; }
.sidebar-nav > details > ul > li > details > ul > li { list-style: none; }
.sidebar-nav > details > ul > li > details > ul > li > a {
display: flex; align-items: center; gap: 6px;
padding: 5px 12px 5px 40px;
font-size: 13px; color: #64748b; text-decoration: none;
border-radius: 6px; border-left: 3px solid transparent;
transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.sidebar-nav > details > ul > li > details > ul > li > a:hover {
background: #f0f4f8; border-left-color: #3b82f6; color: #1e293b;
}

.badge {
font-size: 10px; font-weight: 600; padding: 1px 7px;
border-radius: 10px; margin-left: auto; flex-shrink: 0; white-space: nowrap;
}
.badge.active  { background: #dbeafe; color: #1d4ed8; }
.badge.planned { background: #f1f5f9; color: #64748b; }
.badge.done    { background: #dcfce7; color: #15803d; }
.badge.ongoing { background: #fef08a; color: #a16207; } /* Sarı tonları */  

/* ── DARK MODE ───────────────────────────────────── */
body.dark { background: #0f172a; color: #e2e8f0; }

body.dark .sidebar { background: #1e293b !important; border-right-color: #334155 !important; border-left-color: #334155 !important;}
body.dark #topbar { background: #1e293b; border-bottom-color: #334155; }


body.dark #topbar-search-input { background: #0f172a; border-color: #334155; color: #e2e8f0; }
body.dark #topbar-search-input::placeholder { color: #64748b; }
body.dark #topbar-search-input:focus { border-color: #3b82f6; background: #1e293b; }

body.dark #theme-toggle { background: #334155; border-color: #475569; color: #e2e8f0; }
body.dark #theme-toggle:hover { background: #475569; }

body.dark .lang-switcher a { color: #94a3b8; }
body.dark .lang-switcher a:hover { background: #334155; color: #e2e8f0; }

body.dark .sidebar-nav .home-link { color: #e2e8f0; }
body.dark .sidebar-nav .home-link:hover { background: #334155; }
body.dark .sidebar-nav > details > summary { color: #64748b; }
body.dark .sidebar-nav > details > summary:hover { background: #334155; color: #94a3b8; }
body.dark .sidebar-nav > details > ul > li > a { color: #94a3b8; }
body.dark .sidebar-nav > details > ul > li > a:hover { background: #334155; color: #e2e8f0; }
body.dark .sidebar-nav > details > ul > li > details > summary { color: #94a3b8; }
body.dark .sidebar-nav > details > ul > li > details > summary:hover { background: #334155; color: #e2e8f0; }
body.dark .sidebar-nav > details > ul > li > details > ul > li > a { color: #64748b; }
body.dark .sidebar-nav > details > ul > li > details > ul > li > a:hover { background: #334155; color: #e2e8f0; }

body.dark .markdown-section { color: #e2e8f0; }
body.dark .markdown-section h1,
body.dark .markdown-section h2,
body.dark .markdown-section h3,
body.dark .markdown-section h4 { color: #f1f5f9; border-color: #334155; }
body.dark .markdown-section a { color: #60a5fa; }
body.dark .markdown-section code { background: #334155; color: #e2e8f0; }
body.dark .markdown-section pre { background: #1e293b; border: 1px solid #334155; }
body.dark .markdown-section blockquote { border-left-color: #3b82f6; color: #94a3b8; }
body.dark .markdown-section table th { background: #1e293b; color: #e2e8f0; }
body.dark .markdown-section table td { border-color: #334155; color: #e2e8f0; }
body.dark .markdown-section table tr:nth-child(even) { background: #1e293b; }

body.dark .results-panel { background: #1e293b !important; border-color: #334155 !important; }
body.dark .results-panel .matching-post { border-bottom-color: #334155 !important; }
body.dark .results-panel .matching-post a { color: #60a5fa !important; }
body.dark .results-panel p { color: #94a3b8 !important; }

body.dark .badge.active { background: #172554; color: #60a5fa; }
body.dark .badge.planned { background: #1e293b; color: #64748b; }


/* ── TOTAL MINIMALIST: TÜM OK İKONLARINI KALDIRMA VE ALAN GENİŞLETME ─────── */

/* 1. Sistemdeki EN ÜST SEVİYE dahil tüm katmanlardaki ok işaretlerini tamamen siler */
.sidebar-nav summary::before,
.sidebar-nav details summary::before,
.sidebar-nav details details summary::before,
.sidebar-nav details details details summary::before,
.sidebar-nav li::marker,
.sidebar-nav ul li::before,
.sidebar-nav summary::marker,
.sidebar-nav details summary::-webkit-details-marker {
  display: none !important;
  content: none !important;
  list-style: none !important;
}

/* 2. SİSTEMLER, UYGULAMALAR (1. Seviye Başlıklar) - Ok gidince sola çekildi ve alanı genişletildi */
.sidebar-nav > details > summary {
  padding: 6px 12px !important;
  font-size: 11px !important;
}

/* 3. Amplify Core (2. Seviye) - Hizalaması optimize edildi */
.sidebar-nav > details > ul > li > details > summary {
  padding: 5px 12px 5px 14px !important; /* Ok kalktığı için girinti 14px'e çekilerek yer kazanıldı */
}

/* 4. 01-Araştırma, 02-Mimari (3. Seviye Klasörler) - Kademeli girinti korundu */
.sidebar-nav > details > ul > li > details > ul > li > details > summary {
  cursor: pointer !important;
  display: flex !important;
  align-items: center !important;
  padding: 5px 12px 5px 26px !important; /* Net hiyerarşi için 26px iç girinti */
  font-size: 13px !important;
  font-weight: 600 !important;
  color: #475569 !important;
  border-radius: 6px !important;
  border-left: 3px solid transparent !important;
  transition: background 0.15s, border-color 0.15s, color 0.15s !important;
}
.sidebar-nav > details > ul > li > details > ul > li > details > summary:hover {
  background: #f0f4f8 !important;
  border-left-color: #3b82f6 !important;
  color: #1e293b !important;
}

/* 5. 01-Kavramsal Çerçeve (4. Seviye Alt Linkler) - En iç katman */
.sidebar-nav > details > ul > li > details > ul > li > details > ul > li > a {
  display: flex !important;
  align-items: center !important;
  padding: 5px 12px 5px 38px !important; /* Klasörün altında olduğu belli olsun diye 38px girinti */
  font-size: 13px !important;
  color: #64748b !important;
  text-decoration: none !important;
  border-radius: 6px !important;
  border-left: 3px solid transparent !important;
  transition: background 0.15s, border-color 0.15s, color 0.15s !important;
}
.sidebar-nav > details > ul > li > details > ul > li > details > ul > li > a:hover {
  background: #f0f4f8 !important;
  border-left-color: #3b82f6 !important;
  color: #1e293b !important;
}

/* ── DARK MODE (KARANLIK TEMA) UYUMLULUĞU ───────────────────────────────────── */
body.dark .sidebar-nav > details > ul > li > details > ul > li > details > summary {
  color: #94a3b8 !important;
}
body.dark .sidebar-nav > details > ul > li > details > ul > li > details > summary:hover {
  background: #334155 !important;
  color: #e2e8f0 !important;
}
body.dark .sidebar-nav > details > ul > li > details > ul > li > details > ul > li > a {
  color: #64748b !important;
}
body.dark .sidebar-nav > details > ul > li > details > ul > li > details > ul > li > a:hover {
  background: #334155 !important;
  color: #e2e8f0 !important;
}

</style>
</head>
<body>

<div id="topbar">
<div id="topbar-search">
<input type="text" id="topbar-search-input" placeholder="Ara..." autocomplete="off" spellcheck="false">
</div>
<div class="topbar-right">
<button id="theme-toggle">🌙</button>
<div class="lang-switcher">
<a href="#/en/" id="lang-toggle">EN</a>
</div>
</div>
</div>

<script>
(function() {
const saved = localStorage.getItem('theme');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
if (saved === 'dark' || (!saved && prefersDark)) {
document.body.classList.add('dark');
document.getElementById('theme-toggle').textContent = '☀️';
}
})();
</script>

<div id="app"></div>

<script>
// Tema toggle
document.getElementById('theme-toggle').addEventListener('click', function() {
const isDark = document.body.classList.toggle('dark');
localStorage.setItem('theme', isDark ? 'dark' : 'light');
this.textContent = isDark ? '☀️' : '🌙';
});

// Dil seçici (Tek butonlu akıllı toggle)
function updateLang() {
const isEn = window.location.hash.startsWith('#/en/');
const langToggle = document.getElementById('lang-toggle');

if (isEn) {
langToggle.textContent = 'TR';
langToggle.href = '#/tr/';
} else {
langToggle.textContent = 'EN';
langToggle.href = '#/en/';
}

document.getElementById('topbar-search-input').placeholder = isEn ? 'Search...' : 'Ara...';
}
updateLang();
window.addEventListener('hashchange', updateLang);

// Arama proxy — topbar input'u Docsify'ın gizli arama input'una bağlar
function setupSearchProxy() {
    const sidebarInput = document.querySelector('.search input');
    if (!sidebarInput) { setTimeout(setupSearchProxy, 300); return; }

    const topbarInput = document.getElementById('topbar-search-input');

    function repositionResultsPanel() {
        const panel = document.querySelector('.results-panel');
        const input = document.getElementById('topbar-search-input');
        if (!panel || !input) return;

        const rect = input.getBoundingClientRect();
        
        // Sidebar kapalı mı kontrol et
        const isSidebarClosed = document.body.classList.contains('close');
        const isMobile = window.innerWidth <= 768;

        // Eğer sidebar kapalıysa, panel sidebar'ın içinde olduğu için koordinat sistemi kaymıştır.
        // Bunu düzeltmek için 300px çıkarıyoruz (CSS'deki translateX(300px) ile dengelenir).
        let finalLeft = rect.left;
        if (isSidebarClosed && !isMobile) {
            finalLeft = rect.left - 300; 
        }

        panel.style.setProperty('left', finalLeft + 'px', 'important');
        panel.style.setProperty('width', Math.max(rect.width, 380) + 'px', 'important');
    }

    topbarInput.addEventListener('input', function() {
        sidebarInput.value = this.value;
        sidebarInput.dispatchEvent(new Event('input', { bubbles: true }));
        // Panelin oluşması için bir frame bekle
        requestAnimationFrame(repositionResultsPanel);
    });

    // Sidebar açma/kapama butonuna basıldığında konumu güncelle
    document.addEventListener('click', function(e) {
        if (e.target.closest('.sidebar-toggle')) {
            setTimeout(repositionResultsPanel, 300); // Animasyon bitişini bekle
        }
    });

    window.addEventListener('resize', repositionResultsPanel);

    topbarInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            this.value = '';
            sidebarInput.value = '';
            sidebarInput.dispatchEvent(new Event('input', { bubbles: true }));
        }
    });
}

// Mobilden summary tıklanınca sidebar kapanmasın,
// sadece gerçek link tıklanınca kapansın
function fixMobileSidebar() {
document.querySelectorAll('.sidebar-nav summary').forEach(function(summary) {
summary.addEventListener('click', function(e) {
e.stopPropagation();
});
});
}

// Hamburger butonunu her zaman aynı yerde tut
function fixTogglePosition() {
const toggle = document.querySelector('.sidebar-toggle');
if (!toggle) return;
toggle.style.setProperty('top', '65px', 'important');
toggle.style.setProperty('left', '15px', 'important');
toggle.style.setProperty('bottom', 'auto', 'important');
}

document.addEventListener('click', function(e) {
if (e.target.closest('.sidebar-toggle')) {
setTimeout(fixTogglePosition, 50);
}
});

fixTogglePosition();

// Docsify config
window.$docsify = {
loadSidebar: true,
loadNavbar: false,
subMaxLevel: 0,
search: {
maxAge: 86400000,
paths: 'auto',
placeholder: 'Ara...',
noData: 'Sonuç bulunamadı.',
depth: 3,
hideOtherSidebarContent: false
},
alias: {
'/': '/tr/README.md',
'/_sidebar.md':        '/tr/_sidebar.md',
'/tr/.*/_sidebar.md':  '/tr/_sidebar.md',
'/en/.*/_sidebar.md':  '/en/_sidebar.md'
},
plugins: [
function(hook) {
hook.ready(function() {
setupSearchProxy();
fixMobileSidebar();
fixTogglePosition();
});
hook.doneEach(function() {
fixMobileSidebar();
});
}
]
}
</script>

<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

</body>
</html>
