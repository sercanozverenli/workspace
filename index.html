<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Workspace · Personal R&D Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* Sabit butonlar ve düzen */
    .sidebar-toggle { bottom: auto !important; top: 15px !important; left: 15px !important; position: fixed !important; background: rgba(255, 255, 255, 0.9) !important; z-index: 99; }
    .sidebar { padding-top: 60px !important; }
    @media screen and (max-width: 768px) { .markdown-section { padding-top: 45px !important; } }
    
    /* Modern Dil Butonu */
    .app-nav ul li { background-color: #f4f6f8; border-radius: 20px; padding: 4px 12px; margin-left: 10px; }
    .app-nav li a { font-weight: 600; color: #2c3e50 !important; text-decoration: none; }
    
    /* Tıklanmış/Aktif ve Hover durumlarında renk değişimini %100 iptal eder */
    .sidebar ul li a, .sidebar ul li a.active, .sidebar ul li a.active:hover, .sidebar ul li a:hover {
      color: #2c3e50 !important;
      background: transparent !important;
    }
    .sidebar ul li a.active { font-weight: 700 !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 0, // KOPYA BAŞLIKLARI ÖNLER
      alias: {
        // Ana dizine ilk girişte genel repo README'si yerine Türkçe çalışma alanını yükler
        '/':                     '/tr/README.md',

        '/_sidebar.md':          '/tr/_sidebar.md',
        '/tr/.*/_sidebar.md':    '/tr/_sidebar.md',
        '/en/.*/_sidebar.md':    '/en/_sidebar.md',
        '/_navbar.md':           '/tr/_navbar.md',
        '/tr/.*/_navbar.md':     '/tr/_navbar.md',
        '/en/.*/_navbar.md':     '/en/_navbar.md'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
