<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Workspace · Personal R&D Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" id="docsify-theme" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* Üst Bar Yerleşimi - Jilet gibi Dashboard Düzeni */
    .top-bar {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      height: 60px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #e2e8f0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px 0 330px; /* Sidebar alanını korur */
      box-sizing: border-box;
    }

    /* Docsify'ın Sol Menü Butonunu Üst Bara Göre Hizala */
    .sidebar-toggle {
      bottom: auto !important;
      top: 18px !important;
      left: 15px !important;
      position: fixed !important;
      z-index: 1000 !important;
      background: transparent !important;
    }

    /* Sidebar'ı Üst Barın Altından Başlat */
    .sidebar {
      padding-top: 70px !important;
      z-index: 90 !important;
    }

    /* İçerik Alanını Aşağı Kaydır ki Üst Barın Altında Kalmasın */
    .content {
      padding-top: 40px !important;
    }

    /* Mobil Ekran Uyumluluğu */
    @media screen and (max-width: 768px) {
      .top-bar {
        padding-left: 80px;
      }
      .markdown-section {
        padding-top: 60px !important;
      }
    }

    /* Üst Bar Sağ Aksiyon Alanı */
    .top-bar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Üst Bar Buton Standartları */
    .top-btn {
      background-color: #f4f6f8;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 6px 14px;
      font-weight: 600;
      font-size: 13px;
      color: #2c3e50;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      display: inline-flex;
      align-items: center;
    }
    .top-btn:hover {
      background-color: #e2e8f0;
      color: #1a202c;
    }

    /* Docsify'ın Sidebar İçindeki Orijinal Arama Kutusunu Tamamen Gizle */
    .sidebar .search {
      display: none !important;
    }

    /* Bizim Üst Bardaki Özel Arama Kutumuz */
    .custom-search-container {
      width: 280px;
    }
    .custom-search-container input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      background: #f8fafc;
      outline: none;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .custom-search-container input:focus {
      border-color: #42b983;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(66, 185, 131, 0.1);
    }

    /* Rozet (Badge) Stilleri */
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-weight: bold; }
    .badge.active { background-color: #e6fffa; color: #047481; }
    .badge.planned { background-color: #f7fafc; color: #4a5568; border: 1px solid #edf2f7; }
  </style>
</head>
<body>
  
  <div class="top-bar">
    <div class="custom-search-container">
      <input type="text" id="custom-search-input" placeholder="Ara / Search...">
    </div>
    
    <div class="top-bar-actions">
      <button class="top-btn" id="theme-toggle">🌓 Tema</button>
      
      <a href="#/tr/" class="top-btn" id="lang-tr">TR</a>
      <a href="#/en/" class="top-btn" id="lang-en">EN</a>
    </div>
  </div>

  <div id="app">Workspace yükleniyor...</div>

  <script>
    window.$docsify = {
      loadSidebar: true,
      loadNavbar: false, // Çakışma yaratan yerleşik navbar'ı kapattık! Üst bar elle yönetiliyor.
      subMaxLevel: 0,
      
      // Yerleşik arama motorunu arka planda aktif tutuyoruz (indexleme yapsın diye)
      search: {
        maxAge: 86400000,
        paths: 'auto',
        depth: 2
      },

      alias: {
        // BAŞARDIĞIMIZ VE KORUDUĞUMUZ KÖK DİZİN KURALI
        '/':                     '/tr/README.md',

        // Çalışan tünel kuralların
        '/_sidebar.md':          '/tr/_sidebar.md',
        '/tr/.*/_sidebar.md':    '/tr/_sidebar.md',
        '/en/.*/_sidebar.md':    '/en/_sidebar.md'
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <script>
    // 1. ARAMA MOTORUNU ÜST BARA BAĞLAMA (PROXY MANTIĞI)
    // Docsify'ın gizli arama motorunu tetikleyen akıllı input köprüsü
    document.getElementById('custom-search-input').addEventListener('input', function(e) {
      const docsifySearchInput = document.querySelector('.sidebar .search input');
      if (docsifySearchInput) {
        docsifySearchInput.value = e.target.value;
        docsifySearchInput.dispatchEvent(new Event('input', { bubbles: true }));
      }
    });

    // Dynamic placeholder yönetimi
    window.addEventListener('hashchange', function() {
      const input = document.getElementById('custom-search-input');
      if (window.location.hash.includes('/en/')) {
        input.placeholder = "Search...";
      } else {
        input.placeholder = "Ara...";
      }
    });

    // 2. TEMA DEĞİŞTİRME MOTORU (YENİDEN KURGULANDI - ÇÖKMEZ)
    const themeBtn = document.getElementById('theme-toggle');
    let themeState = 'vue';
    themeBtn.addEventListener('click', () => {
      const themeLink = document.getElementById('docsify-theme');
      if (themeState === 'vue') {
        themeLink.href = '//cdn.jsdelivr.net/npm/docsify@4/lib/themes/buble.css';
        themeState = 'buble';
      } else {
        themeLink.href = '//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css';
        themeState = 'vue';
      }
    });
  </script>
</body>
</html>
