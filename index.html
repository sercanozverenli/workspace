<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Workspace · Personal R&D Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .sidebar-toggle {
      bottom: auto !important;
      top: 15px !important;
      left: 15px !important;
      position: fixed !important;
      background: rgba(255, 255, 255, 0.9) !important;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      z-index: 99;
    }
    .sidebar {
      padding-top: 60px !important;
    }
  </style>
</head>
<body>
  <div id="app">Loading workspace...</div>
  <script>
    // 1. Docsify motoru çalışmadan önce, ana siteye girildiğinde sistemi doğrudan Türkçe klasörüne fırlatır.
    // Bu sayede sistem kök dizinde var olmayan bir _sidebar arayıp çökmez.
    if (window.location.hash === '' || window.location.hash === '#/') {
      window.location.hash = '#/tr/';
    }

    window.$docsify = {
      name: 'Workspace',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      alias: {
        // 2. Sadece alt klasörlerin (projeler vb.) ana sidebar'ı okumasını sağlar.
        // (.+) regex'i kullanıldığı için, dosyaların kendi kendisiyle çakışmasını engeller.
        '/tr/(.+)/_sidebar.md': '/tr/_sidebar.md',
        '/en/(.+)/_sidebar.md': '/en/_sidebar.md'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
