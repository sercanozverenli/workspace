<div class="container-fluid">
  <div id="baslik"><h1 align="center"><strong>4'ler</strong></h1> </div>
  <form id="4ler">
    <div id="soru1" class="form-group">
      <label>4 x 1</label>
      <input type="number" class="form-control">
    </div>
    <div id="soru2" class="form-group">
      <label>4 x 2</label>
      <input type="number" class="form-control">
    </div>

    </div>
    <div id="soru10" class="form-group">
      <label>4 x 10</label>
      <input type="number" class="form-control">
    </div>

  </form>
<button class="btn btn-primary" id="kimsinSenButton">Kimim Ben?</button>

<button type="button" class="btn btn-primary" id="resetButton">Tümünü Sil</button>




</div>


<script>

////////////doğru yanlış yönlendirme////////////////
const answers = [4, 8, 12, 16, 20, 24, 28, 32, 36, 40];

const form = document.querySelector('form');
const inputs = form.querySelectorAll('input');
const btn = document.querySelector('#kimsinSenButton');

btn.addEventListener('click', function (e) {
  e.preventDefault();
  let correct = true;
  inputs.forEach(function (input, index) {
    if (input.value != answers[index]) {
      input.style.backgroundColor = 'rgb(255, 0, 0, 0.3)';
      correct = false;
    } else {
      input.style.backgroundColor = 'white';
    }
  });
  if (correct) {
    const randomPage = Math.floor(Math.random() * 15) + 9;
    window.location.href = `aferin${randomPage}.html`;
  } else {
    alert("Yanlış olanları kontrol et ve tekrar dene");
  }
});
	
////////////////soruların sırası değişsin//////////////////

function shuffleElements() {
    var parent = document.getElementById("4ler");
    var divs = parent.children;
    var divArr = [];
    for (var i = 0; i < divs.length; i++) {
      if (divs[i].id.startsWith("soru")) {
        divArr.push(divs[i]);
      }
    }
    for (var i = divArr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = divArr[i];
      divArr[i] = divArr[j];
      divArr[j] = temp;
    }
    for (var i = 0; i < divArr.length; i++) {
      parent.appendChild(divArr[i]);
    }
  }
  window.addEventListener("load", shuffleElements);
	
//////////formverileri SIFIRLA////////////
window.onload = function() {
    window.addEventListener("beforeunload", function (e) {
        var form = document.querySelector("form");
        form.reset();
    });
};
	
	
////////////////form verileri sıfırla/////////////////////
 
document.getElementById("resetButton").addEventListener("click", function() {
    var formElements = document.getElementsByClassName("form-control");
    for (var i = 0; i < formElements.length; i++) {
        formElements[i].value = "";
    }
});


////////////////////////////////////////////////////////
</script>
